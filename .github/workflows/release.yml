name: release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Read package version
        id: version
        run: |
          echo "value=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check existing tag
        id: tag
        run: |
          tag="v${{ steps.version.outputs.value }}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "value=${tag}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "exists=false" >> "$GITHUB_OUTPUT"
          echo "value=${tag}" >> "$GITHUB_OUTPUT"

      - name: Stop when current version is already released
        if: steps.tag.outputs.exists == 'true'
        run: echo "Tag ${{ steps.tag.outputs.value }} already exists, skipping release."

      - name: Validate release secrets
        if: steps.tag.outputs.exists == 'false'
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::Missing NPM_TOKEN secret. Add it in GitHub repository settings before releasing."
            exit 1
          fi

      - name: Install dependencies
        if: steps.tag.outputs.exists == 'false'
        run: pnpm install --frozen-lockfile

      - name: Build
        if: steps.tag.outputs.exists == 'false'
        run: pnpm build

      - name: Test
        if: steps.tag.outputs.exists == 'false'
        run: pnpm test

      - name: Create and push tag
        if: steps.tag.outputs.exists == 'false'
        run: |
          git tag "${{ steps.tag.outputs.value }}"
          git push origin "${{ steps.tag.outputs.value }}"

      - name: Publish package to npm
        if: steps.tag.outputs.exists == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --registry=https://registry.npmjs.org

      - name: Create GitHub Release
        if: steps.tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.tag.outputs.value }}" \
            --title "${{ steps.tag.outputs.value }}" \
            --generate-notes
