name: Feature request
description: Suggest an improvement for welight-cli
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What workflow is blocked or awkward today?
      placeholder: Describe the user problem first.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What change would help?
      placeholder: Describe the behavior or command you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches or workarounds you tried?
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add examples, references, or screenshots if useful.
